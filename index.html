<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Terminology Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #f6f7fb;
      --card-bg: #ffffff;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 10px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #e0f2fe 0, #f9fafb 50%, #e5e7eb 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(248,250,252,0.98));
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px 22px 26px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(14px);
    }

    @media (min-width: 768px) {
      .app {
        padding: 32px 32px 30px;
      }
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .logo-dot {
      width: 32px;
      height: 32px;
      border-radius: 11px;
      background: conic-gradient(from 210deg, #2563eb, #4f46e5, #06b6d4, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.4);
    }

    h1 {
      font-size: 1.35rem;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    @media (min-width: 900px) {
      .layout {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    /* Left column: search & list */
    .left-column {
      flex: 1;
      min-width: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .search-box {
      position: relative;
      flex: 1 1 260px;          
      min-width: 200px;
    }

    .search-input {
      width: 100%;
      padding: 9px 34px 9px 30px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.93rem;
      outline: none;
      transition: all 0.16s ease;
      box-shadow: inset 0 0 0 0 rgba(37, 99, 235, 0.1);
    }

    .search-input:focus {
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.11), 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-muted);
      padding: 0;
      display: none;
    }

    .clear-btn.visible {
      display: block;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .jira-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid #1d4ed8;
      background: #ffffff;
      color: #1d4ed8;
      font-size: 0.86rem;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(15, 23, 42, 0.08);
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
      flex: 0 0 auto;           /* prevent it from growing across the row */
    }

    .jira-btn:hover {
      background: #eff6ff;
      color: #1d4ed8;
      box-shadow: 0 5px 12px rgba(37, 99, 235, 0.28);
    }

    .jira-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.25);
    }

    .select {
      padding: 7px 26px 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f9fafb;
      font-size: 0.82rem;
      color: var(--text-main);
      cursor: pointer;
    }

    .meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      flex: 0 1 auto;
      min-width: 0;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #1d4ed8;
      font-size: 0.74rem;
      font-weight: 500;
    }

    .results-list {
      margin-top: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
      border-radius: 12px;
    }

    .result-row {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      padding: 8px 10px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .result-row:hover {
      background: #eff6ff;
      border-color: rgba(129, 140, 248, 0.9);
    }

    .result-row.selected {
      background: #e0ecff;
      border-color: #2563eb;
    }

    .result-term {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .result-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge-status {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.72rem;
      background: #ecfeff;
      color: #0369a1;
    }

    .badge-workflow {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.72rem;
      background: #fef3c7;
      color: #92400e;
    }

    .empty-state,
    .error-state {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 30px 12px 10px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid #d1d5db;
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    mark {
      background: #fef3c7;
      padding: 0 1px;
      border-radius: 2px;
    }

    /* Right column: details */
    .right-column {
      flex: 1.2;
      min-width: 0;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid rgba(226, 232, 240, 0.9);
      padding: 12px 14px 14px;
      max-height: 460px;
      overflow-y: auto;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .detail-term {
      font-size: 1.05rem;
      font-weight: 650;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      font-size: 0.75rem;
    }

    .tag {
      padding: 2px 8px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
    }

    .tag-pos {
      background: #ede9fe;
      color: #4c1d95;
    }

    .tag-status {
      background: #dcfce7;
      color: #166534;
    }

    .tag-workflow {
      background: #fee2e2;
      color: #991b1b;
    }

    .section-title {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin: 10px 0 4px;
    }

    .definition-text {
      font-size: 0.9rem;
      color: #111827;
      line-height: 1.4;
    }

    .small-text {
      font-size: 0.78rem;
      color: #4b5563;
      line-height: 1.35;
    }

    .synonym-list, .related-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .syn-item, .rel-item {
      padding: 4px 6px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: baseline;
    }

    .syn-main, .rel-main {
      font-size: 0.86rem;
      font-weight: 500;
    }

    .syn-meta, .rel-meta {
      font-size: 0.75rem;
      color: #6b7280;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.75rem;
      text-decoration: none;
    }

    .pill-muted {
      background: #f3f4f6;
      color: #4b5563;
    }

    .placeholder-detail {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding-top: 80px;
    }
    /* Clickable synonyms and related terms */
.syn-item.clickable,
.rel-item.clickable {
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.syn-item.clickable:hover,
.rel-item.clickable:hover {
  background: #eff6ff;
  border-color: #2563eb;
}

.term-link {
  color: #2563eb;
  text-decoration: underline;
  text-decoration-color: rgba(37, 99, 235, 0.3);
  text-underline-offset: 2px;
}

.syn-item.clickable:hover .term-link,
.rel-item.clickable:hover .term-link {
  text-decoration-color: #2563eb;
}

.not-found-badge {
  font-size: 0.68rem;
  padding: 1px 5px;
  border-radius: 999px;
  background: #f3f4f6;
  color: #9ca3af;
  margin-left: 6px;
  font-style: italic;
}
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title-row">
        <div class="logo-dot">T</div>
        <div>
          <h1>Terminology Search</h1>
          <p class="subtitle">
            Search your termbase, filter by workflow status, and view synonyms and related terms in context.
          </p>
        </div>
      </div>
    </header>

    <div class="layout">
      <!-- LEFT: SEARCH & LIST -->
      <section class="left-column">
        
  <div class="controls">
    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="Search terms..."
          autocomplete="off"
        />
        <button id="clearBtn" class="clear-btn" aria-label="Clear search">×</button>
      </div>

  <div class="filter-group">
    <span>Workflow status:</span>
    <select id="workflowFilter" class="select">
      <option value="">All</option>
    </select>
  </div>

  <div class="meta">
    <span id="statusText">Loading data…</span>
  </div>

  <!-- Jira term request button -->
  <a
    href="https://netflix.atlassian.net/jira/software/c/projects/GAMESXD/form/3829"
    class="jira-btn"
    target="_blank"
    rel="noopener noreferrer"
  >
    + Request new term
  </a>
</div>
  

        <div id="resultsList" class="results-list"></div>
      </section>

      <!-- RIGHT: DETAILS -->
      <section id="detailPanel" class="right-column">
        <div class="placeholder-detail">
          Select a term from the list to view its definition, synonyms, and related terms.
        </div>
      </section>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby_A0CyqhezoTyT6gUHqJ4XtgB-rnJYyl3TwQFfF9yj3yBsFVwbeN9YTmxjazKCmHw7/exec"; // keep your existing URL

const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");
const resultsList = document.getElementById("resultsList");
const workflowFilter = document.getElementById("workflowFilter");
const statusText = document.getElementById("statusText");
const detailPanel = document.getElementById("detailPanel");

let allTerms = [];
let filteredTerms = [];
let lastQuery = "";
let selectedTermId = null;

async function fetchData() {
  statusText.textContent = "Loading data…";
  resultsList.innerHTML = `
    <div class="empty-state">
      <div class="spinner"></div>
      <div>Fetching terminology from Google Sheets…</div>
    </div>
  `;
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error("Network error");
    const data = await res.json();
    if (!data.success) throw new Error("API error");

    // Filter out empty rows (no Term)
    allTerms = (data.items || []).filter(item => String(item["Term"] || "").trim() !== "");
    
    buildWorkflowOptions(allTerms);
    applyFilters();
    statusText.innerHTML = `
      <span class="chip">
        ${allTerms.length} term${allTerms.length === 1 ? "" : "s"} loaded
      </span>
    `;
  } catch (err) {
    console.error(err);
    resultsList.innerHTML = `
      <div class="error-state">
        <div>⚠️ Unable to load terminology.</div>
        <div style="margin-top:4px;font-size:0.82rem;">
          Check that your Apps Script web app is deployed and the URL is correct.
        </div>
      </div>
    `;
    statusText.textContent = "Error loading data";
  }
}

function buildWorkflowOptions(items) {
  const set = new Set();
  items.forEach(it => {
    const wf = String(it["Workflow status"] || "").trim();
    if (wf) set.add(wf);
  });
  const options = Array.from(set).sort();
  while (workflowFilter.options.length > 1) {
    workflowFilter.remove(1);
  }
  options.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    workflowFilter.appendChild(opt);
  });
}

function applyFilters() {
  const q = lastQuery.trim().toLowerCase();
  const wf = workflowFilter.value.trim().toLowerCase();

  filteredTerms = allTerms.filter(item => {
    if (wf) {
      const wfVal = String(item["Workflow status"] || "").toLowerCase();
      if (!wfVal.includes(wf)) return false;
    }
    if (!q) return true;
    const haystack = [
      item["Term"],
      item["Definition"],
      item["Synonyms"],
      item["Related terms"]
    ]
      .join(" ")
      .toLowerCase();
    return haystack.includes(q);
  });

  renderResultList();
}

function highlight(text, query) {
  if (!query) return text;
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp(`(${q})`, "ig");
  return text.replace(re, "<mark>$1</mark>");
}

function renderResultList() {
  const q = lastQuery.trim().toLowerCase();
  if (!filteredTerms.length) {
    resultsList.innerHTML = `
      <div class="empty-state">
        <div>No matching terms found.</div>
        <div style="font-size:0.8rem;margin-top:4px;">
          Try a different keyword or adjust the workflow status filter.
        </div>
      </div>
    `;
    if (selectedTermId) {
      detailPanel.innerHTML = `
        <div class="placeholder-detail">
          No term selected. Adjust filters or search to continue.
        </div>
      `;
    }
    return;
  }

  resultsList.innerHTML = filteredTerms
    .map(item => {
      const id = String(item["ID"] || item["Term"]);
      const term = String(item["Term"] || "").trim();
      const def = String(item["Definition"] || "").trim();
      const status = String(item["Status"] || "").trim();
      const wf = String(item["Workflow status"] || "").trim();

      const isSelected = id === selectedTermId;
      return `
        <div class="result-row ${isSelected ? "selected" : ""}" data-id="${escapeAttr(id)}">
          <div>
            <div class="result-term">${highlight(term || "(Untitled term)", q)}</div>
            <div class="result-meta">
              ${status ? `<span class="badge-status">${escapeHtml(status)}</span>` : ""}
              ${wf ? `<span class="badge-workflow">${escapeHtml(wf)}</span>` : ""}
              ${def ? `<span>${highlight(shorten(def, 70), q)}</span>` : ""}
            </div>
          </div>
        </div>
      `;
    })
    .join("");

  Array.from(resultsList.querySelectorAll(".result-row")).forEach(row => {
    row.addEventListener("click", () => {
      const id = row.getAttribute("data-id");
      selectTermById(id);
    });
  });

  if (!selectedTermId && filteredTerms.length > 0) {
    const firstId = String(filteredTerms[0]["ID"] || filteredTerms[0]["Term"]);
    selectTermById(firstId, false);
  }
}

function shorten(text, maxLen) {
  if (text.length <= maxLen) return text;
  return text.slice(0, maxLen - 1) + "…";
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function escapeAttr(text) {
  return String(text).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function selectTermById(id, scrollToRow = true) {
  selectedTermId = id;
  const item = allTerms.find(it => String(it["ID"] || it["Term"]) === id);
  if (!item) return;

  renderResultList();

  if (scrollToRow) {
    const row = resultsList.querySelector(`.result-row[data-id="${CSS.escape(id)}"]`);
    if (row && typeof row.scrollIntoView === "function") {
      row.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }

  renderDetail(item);
}

// Navigate to a term by name (used for clickable synonyms/related terms)
function navigateToTerm(termName) {
  const normalized = termName.trim().toLowerCase();
  const item = allTerms.find(it => String(it["Term"] || "").trim().toLowerCase() === normalized);
  
  if (item) {
    // Clear filters to ensure the term is visible
    searchInput.value = "";
    lastQuery = "";
    workflowFilter.value = "";
    
    // Reset to show all terms
    filteredTerms = allTerms;
    
    // Select the term
    const id = String(item["ID"] || item["Term"]);
    selectedTermId = id;
    
    renderResultList();
    
    // Scroll to it
    const row = resultsList.querySelector(`.result-row[data-id="${CSS.escape(id)}"]`);
    if (row) {
      row.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
    
    renderDetail(item);
  } else {
    // Term not found in database — search for it instead
    searchInput.value = termName;
    lastQuery = termName;
    clearBtn.classList.add("visible");
    applyFilters();
  }
}

function parseListField(value) {
  if (!value) return [];
  return String(value)
    .split(/[,;]/)
    .map(s => s.trim())
    .filter(Boolean);
}

function buildTermIndex(items) {
  const map = {};
  items.forEach(it => {
    const t = String(it["Term"] || "").trim();
    if (!t) return;
    map[t.toLowerCase()] = it;
  });
  return map;
}

function renderDetail(item) {
  const term = String(item["Term"] || "").trim();
  const pos = String(item["Part of speech"] || "").trim();
  const form = String(item["Form"] || "").trim();
  const status = String(item["Status"] || "").trim();
  const wf = String(item["Workflow status"] || "").trim();
  const audience = String(item["Audience"] || "").trim();
  const def = String(item["Definition"] || "").trim();
  const usageGuidelines = String(item["Usage guidelines"] || "").trim();
  const example = String(item["Usage example"] || "").trim();
  const usageLink = String(item["Usage link"] || "").trim();
  const defSource = String(item["Definition Source"] || "").trim();
  const termImportedFrom = String(item["Term Imported From"] || "").trim();
  const researchLink = String(item["Links to term research"] || "").trim();
  const industryTerm = String(item["Industry term"] || "").trim();
  const locDomain = String(item["Loc Domain"] || "").trim();
  const taxonomy = String(item["Taxonomy"] || "").trim();
  const notes = String(item["Notes"] || "").trim();

  const synonyms = parseListField(item["Synonyms"]);
  const related = parseListField(item["Related terms"]);

  const byTerm = buildTermIndex(allTerms);

  // Build synonym details with clickable links
  const synonymDetails = synonyms.map(name => {
    const row = byTerm[name.toLowerCase()];
    return {
      name,
      exists: !!row,
      pos: row ? String(row["Part of speech"] || "").trim() : "",
      status: row ? String(row["Status"] || "").trim() : "",
      workflow: row ? String(row["Workflow status"] || "").trim() : ""
    };
  });

  // Build related term details with clickable links
  const relatedDetails = related.map(name => {
    const row = byTerm[name.toLowerCase()];
    return {
      name,
      exists: !!row,
      pos: row ? String(row["Part of speech"] || "").trim() : "",
      status: row ? String(row["Status"] || "").trim() : "",
      workflow: row ? String(row["Workflow status"] || "").trim() : ""
    };
  });

  detailPanel.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-term">${escapeHtml(term) || "(Untitled term)"}</div>
        <div class="detail-tags">
          ${pos ? `<span class="tag tag-pos">${escapeHtml(pos)}</span>` : ""}
          ${form ? `<span class="tag">${escapeHtml(form)}</span>` : ""}
          ${status ? `<span class="tag tag-status">${escapeHtml(status)}</span>` : ""}
          ${wf ? `<span class="tag tag-workflow">${escapeHtml(wf)}</span>` : ""}
          ${audience ? `<span class="tag">${escapeHtml(audience)}</span>` : ""}
          ${industryTerm && industryTerm !== "false" ? `<span class="tag">Industry term</span>` : ""}
        </div>
      </div>
    </div>

    ${def ? `
      <div class="section-title">Definition</div>
      <div class="definition-text">${escapeHtml(def)}</div>
    ` : ""}

    ${usageGuidelines ? `
      <div class="section-title">Usage guidelines</div>
      <div class="small-text">${escapeHtml(usageGuidelines)}</div>
    ` : ""}

    ${example || usageLink ? `
      <div class="section-title">Usage example</div>
      <div class="small-text">
        ${example ? `<div>${escapeHtml(example)}</div>` : ""}
        ${usageLink ? `
          <div style="margin-top:4px;">
            <a class="pill-link" href="${escapeAttr(usageLink)}" target="_blank" rel="noopener noreferrer">
              🔗 Example link
            </a>
          </div>
        ` : ""}
      </div>
    ` : ""}

    ${synonymDetails.length ? `
      <div class="section-title">Synonyms</div>
      <div class="synonym-list">
        ${synonymDetails.map(s => `
          <div class="syn-item ${s.exists ? 'clickable' : ''}" ${s.exists ? `data-term="${escapeAttr(s.name)}"` : ""}>
            <div class="syn-main">
              ${s.exists ? `<span class="term-link">${escapeHtml(s.name)}</span>` : escapeHtml(s.name)}
              ${!s.exists ? `<span class="not-found-badge">not in database</span>` : ""}
            </div>
            <div class="syn-meta">
              ${s.pos ? `<span>${escapeHtml(s.pos)}</span>` : ""}
              ${s.status ? `<span>${escapeHtml(s.status)}</span>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}

    ${relatedDetails.length ? `
      <div class="section-title" style="opacity:0.8;">Related terms</div>
      <div class="related-list" style="opacity:0.9;">
        ${relatedDetails.map(r => `
          <div class="rel-item ${r.exists ? 'clickable' : ''}" ${r.exists ? `data-term="${escapeAttr(r.name)}"` : ""}>
            <div class="rel-main">
              ${r.exists ? `<span class="term-link">${escapeHtml(r.name)}</span>` : escapeHtml(r.name)}
              ${!r.exists ? `<span class="not-found-badge">not in database</span>` : ""}
            </div>
            <div class="rel-meta">
              ${r.pos ? `<span>${escapeHtml(r.pos)}</span>` : ""}
              ${r.status ? `<span>${escapeHtml(r.status)}</span>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    ` : ""}

    ${(termImportedFrom || defSource || researchLink || locDomain || taxonomy || notes) ? `
      <div class="section-title">Metadata</div>
      <div class="small-text">
        ${termImportedFrom ? `<div><strong>Term imported from:</strong> ${escapeHtml(termImportedFrom)}</div>` : ""}
        ${defSource ? `<div><strong>Definition source:</strong> ${escapeHtml(defSource)}</div>` : ""}
        ${locDomain ? `<div><strong>Loc domain:</strong> ${escapeHtml(locDomain)}</div>` : ""}
        ${taxonomy ? `<div><strong>Taxonomy:</strong> ${escapeHtml(taxonomy)}</div>` : ""}
        ${researchLink ? `
          <div style="margin-top:4px;">
            <a class="pill-link pill-muted" href="${escapeAttr(researchLink)}" target="_blank" rel="noopener noreferrer">
              🔗 Term research
            </a>
          </div>
        ` : ""}
        ${notes ? `<div style="margin-top:4px;"><strong>Notes:</strong> ${escapeHtml(notes)}</div>` : ""}
      </div>
    ` : ""}
  `;

  // Add click handlers for synonyms and related terms
  detailPanel.querySelectorAll(".syn-item.clickable, .rel-item.clickable").forEach(el => {
    el.addEventListener("click", () => {
      const termName = el.getAttribute("data-term");
      if (termName) {
        navigateToTerm(termName);
      }
    });
  });
}

// Debounced search
let debounceTimer;
function onSearchInput(e) {
  const value = e.target.value;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    lastQuery = value;
    applyFilters();
  }, 150);
  clearBtn.classList.toggle("visible", value.length > 0);
}

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  clearBtn.classList.remove("visible");
  lastQuery = "";
  applyFilters();
  searchInput.focus();
});

searchInput.addEventListener("input", onSearchInput);
workflowFilter.addEventListener("change", () => {
  applyFilters();
});

// Initial load
fetchData();
  </script>
</body>
</html>
